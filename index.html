<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Finanzas Nivel Dios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#607595; }
.card { border-radius:12px; }
.alerta { font-weight:bold; }
</style>
</head>

<body>

<div class="container mt-5">
<div class="card shadow p-4">

<h2 class="text-center mb-4">💰 Mis Finanzas</h2>

<!-- MES -->
<select id="mes" class="form-control mb-3">
<option>Enero</option>
<option>Febrero</option>
<option>Marzo</option>
<option>Abril</option>
<option>Mayo</option>
<option>Junio</option>
<option>Julio</option>
<option>Agosto</option>
<option>Septiembre</option>
<option>Octubre</option>
<option>Noviembre</option>
<option>Diciembre</option>
</select>

<!-- INGRESOS -->
<h4>Ingresos</h4>
<ul id="listaIngresos" class="list-group mb-3"></ul>

<input id="nombreIngreso" class="form-control mb-2" placeholder="Nombre">
<input id="cantidadIngreso" type="number" class="form-control mb-2" placeholder="Cantidad">
<button class="btn btn-success mb-3" onclick="agregarIngreso()">Agregar Ingreso</button>

<!-- GASTOS -->
<h4>Gastos</h4>
<ul id="listaGastos" class="list-group mb-3"></ul>

<input id="nombreGasto" class="form-control mb-2" placeholder="Nombre">
<input id="cantidadGasto" type="number" class="form-control mb-2" placeholder="Cantidad">

<select id="categoriaGasto" class="form-control mb-2">
<option>Comida 🍔</option>
<option>Transporte 🚌</option>
<option>Entretenimiento 🎮</option>
<option>Servicios 💡</option>
<option>Otros 📦</option>
</select>

<button class="btn btn-danger mb-3" onclick="agregarGasto()">Agregar Gasto</button>



<!-- RESUMEN -->
<h4>Resumen</h4>
<p>Ingresos: $<span id="totalIngresos"></span></p>
<p>Gastos: $<span id="totalGastos"></span></p>
<h5>Saldo: $<span id="saldo"></span></h5>

<p id="alerta" class="alerta"></p>
<p id="alertaCategoria"></p>

<!-- GRAFICAS -->
<div class="row">
<div class="col-md-6">
<canvas id="graficaGeneral"></canvas>
</div>
<div class="col-md-6">
<canvas id="graficaCategorias"></canvas>
</div>
</div>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];
let presupuestos = JSON.parse(localStorage.getItem("presupuestos")) || {};

let chart1, chart2;

function mesActual(){
return document.getElementById("mes").value;
}

function agregarIngreso(){
data.push({
tipo:"ingreso",
nombre:nombreIngreso.value,
cantidad:parseFloat(cantidadIngreso.value),
mes:mesActual()
});
limpiar();
guardar();
actualizar();
}

function agregarGasto(){
data.push({
tipo:"gasto",
nombre:nombreGasto.value,
cantidad:parseFloat(cantidadGasto.value),
categoria:categoriaGasto.value,
mes:mesActual()
});
limpiar();
guardar();
actualizar();
}

function eliminar(index){
data.splice(index,1);
guardar();
actualizar();
}

function guardarPresupuesto(){
presupuestos[presupuestoCategoria.value]=parseFloat(montoPresupuesto.value);
localStorage.setItem("presupuestos",JSON.stringify(presupuestos));
alert("Presupuesto guardado");
}

function limpiar(){
nombreIngreso.value="";
cantidadIngreso.value="";
nombreGasto.value="";
cantidadGasto.value="";
}

function guardar(){
localStorage.setItem("data",JSON.stringify(data));
}

function actualizar(){

let ingresos=0;
let gastos=0;
let categorias={};

let listaI="";
let listaG="";

data.filter(d=>d.mes===mesActual()).forEach((d,i)=>{

if(d.tipo==="ingreso"){
ingresos+=d.cantidad;
listaI+=`<li class="list-group-item d-flex justify-content-between align-items-center">
${d.nombre}: $${d.cantidad}
<button class="btn btn-danger btn-sm" onclick="eliminar(${i})">X</button>
</li>`;
}else{
gastos+=d.cantidad;

categorias[d.categoria]=(categorias[d.categoria]||0)+d.cantidad;

listaG+=`<li class="list-group-item d-flex justify-content-between align-items-center">
${d.nombre} (${d.categoria}): $${d.cantidad}
<button class="btn btn-danger btn-sm" onclick="eliminar(${i})">X</button>
</li>`;
}

});

listaIngresos.innerHTML=listaI;
listaGastos.innerHTML=listaG;

totalIngresos.innerText=ingresos;
totalGastos.innerText=gastos;

let saldo=ingresos-gastos;
document.getElementById("saldo").innerText=saldo.toFixed(2);

// ALERTA GENERAL
if(saldo<0){
alerta.innerHTML="🔴 Te estás pasando del presupuesto";
alerta.style.color="red";
}else if(saldo<20){
alerta.innerHTML="🟠 Te queda poco dinero";
alerta.style.color="orange";
}else{
alerta.innerHTML="🟢 Buen control";
alerta.style.color="green";
}

// ALERTA POR CATEGORIA
let alertaCat="";
for(let cat in categorias){
if(presupuestos[cat] && categorias[cat]>presupuestos[cat]){
alertaCat+=`⚠️ Exceso en ${cat}<br>`;
}
}
alertaCategoria.innerHTML=alertaCat;

// GRAFICAS
if(chart1) chart1.destroy();
chart1=new Chart(graficaGeneral,{
type:"bar",
data:{labels:["Ingresos","Gastos"],datasets:[{data:[ingresos,gastos]}]}
});

if(chart2) chart2.destroy();
chart2=new Chart(graficaCategorias,{
type:"pie",
data:{labels:Object.keys(categorias),datasets:[{data:Object.values(categorias)}]}
});
}

mes.addEventListener("change",actualizar);

actualizar();
</script>

</body>
</html>
